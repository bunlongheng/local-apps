<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Monitor</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monitor">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #64748b;
    --up: #22c55e;
    --down: #ef4444;
    --starting: #f59e0b;
    --accent: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

  .wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  header { padding: 20px 0; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
  main { padding: 28px 0; }

  /* Filter bar */
  .filter-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
  .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: 11px; padding: 4px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 600; }
  .filter-btn.active-up { background: var(--up); color: #0f1117; border-color: var(--up); font-weight: 600; }
  .filter-btn.active-down { background: var(--down); color: #fff; border-color: var(--down); font-weight: 600; }

  /* Table */
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 8px 12px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; text-align: left; }
  th.right { text-align: right; }
  td { padding: 16px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover td { background: rgba(255,255,255,0.025); }

  /* Status dot */
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.up { background: var(--up); box-shadow: 0 0 6px var(--up); }
  .dot.down { background: var(--down); box-shadow: 0 0 6px var(--down); animation: pulse 1.5s infinite; }
  .dot.starting { background: var(--starting); box-shadow: 0 0 6px var(--starting); animation: pulse 1s infinite; }
  .dot.unknown { background: var(--muted); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .app-name { font-weight: 600; font-size: 13px; color: var(--text); text-decoration: none; }
  .app-name:hover { text-decoration: underline; }
  .checked { color: var(--muted); font-size: 11px; }
  .no-apps { text-align: center; padding: 60px; color: var(--muted); }

  .status-text.up { color: var(--up); }
  .status-text.down { color: var(--down); }
  .status-text.starting { color: var(--starting); }

  /* Modal */
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:580px; max-width:94vw; padding:24px; position:relative; }
  .modal-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .modal-title { font-size:16px; font-weight:700; }
  .modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; line-height:1; }
  .modal-close:hover { color:#fff; }
  .modal-rows { display:flex; flex-direction:column; }
  .modal-row { display:flex; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); gap:16px; }
  .modal-row:last-child { border-bottom:none; }
  .modal-key { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap; flex-shrink:0; width:110px; }
  .modal-val { font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  .modal-val a { color:#fff; text-decoration:none; }
  .modal-val a:hover { text-decoration:underline; }
  .copy-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; margin-left:6px; }
  .copy-btn:hover { color:#fff; }

  /* Header indicators */
  .hdr-ind { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); letter-spacing:0.03em; }
  .hdr-ind-val { font-size:10px; font-weight:700; color:var(--text); }
  .hdr-ind-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .hdr-ind-dot.green    { background:#22c55e; box-shadow:0 0 4px #22c55e55; }
  .hdr-ind-dot.yellow   { background:#f59e0b; box-shadow:0 0 4px #f59e0b55; animation:pulse 2s infinite; }
  .hdr-ind-dot.red      { background:#ef4444; box-shadow:0 0 5px #ef444455; animation:pulse 1.5s infinite; }
  .hdr-ind-dot.critical { background:#ff4444; box-shadow:0 0 7px #ff444499; animation:pulse 0.8s infinite; }

  /* Local-only badge */
  .local-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(100,116,139,0.12); border:1px solid rgba(100,116,139,0.25); border-radius:20px; padding:3px 10px; font-size:10px; color:var(--muted); letter-spacing:0.05em; }
  .local-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:#64748b; display:inline-block; }

  /* System warning banner */
  .sys-banner { padding:8px 0; margin-bottom:18px; display:none; }
  .sys-banner.show { display:block; }
  .sys-banner-inner { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; font-size:12px; font-weight:500; }
  .sys-banner-inner.yellow { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.3); color:#f59e0b; }
  .sys-banner-inner.red    { background:rgba(239,68,68,0.12);  border:1px solid rgba(239,68,68,0.3);  color:#ef4444; }
  .sys-banner-inner.critical { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.5); color:#ff6b6b; }

  /* Services section title */
  .section-title { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); font-weight:600; margin-bottom:12px; margin-top:28px; }
  .start-btn { background:none; border:1px solid rgba(34,197,94,0.35); color:rgba(34,197,94,0.8); font-family:inherit; font-size:10px; padding:3px 10px; border-radius:4px; cursor:pointer; transition:all 0.15s; }
  .start-btn:hover { background:rgba(34,197,94,0.15); border-color:#22c55e; color:#22c55e; }
  .down-detail { font-size:10px; color:var(--muted); margin-top:3px; }
</style>
</head>
<body>

<header>
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;gap:16px">
    <div>
      <h1>Apps Monitor</h1>
      <div id="headerIndicators" style="display:flex;gap:10px;align-items:center;margin-top:6px"></div>
    </div>
    <div style="position:relative">
      <button id="qrBtn" onclick="toggleQR()" title="Show LAN QR code" style="background:none;border:none;outline:none;cursor:pointer;padding:0;line-height:1;opacity:0.35;transition:opacity 0.15s;-webkit-tap-highlight-color:transparent;user-select:none" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity=document.getElementById('qrPopover').style.display!=='none'?'1':'0.35'">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="8" height="8" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
          <rect x="3.5" y="3.5" width="3" height="3" fill="white"/>
          <rect x="13" y="1" width="8" height="8" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
          <rect x="15.5" y="3.5" width="3" height="3" fill="white"/>
          <rect x="1" y="13" width="8" height="8" rx="1" stroke="white" stroke-width="1.5" fill="none"/>
          <rect x="3.5" y="15.5" width="3" height="3" fill="white"/>
          <rect x="13" y="13" width="2.5" height="2.5" fill="white"/>
          <rect x="16.5" y="13" width="2.5" height="2.5" fill="white"/>
          <rect x="13" y="16.5" width="2.5" height="2.5" fill="white"/>
          <rect x="16.5" y="16.5" width="2.5" height="2.5" fill="white"/>
        </svg>
      </button>
      <div id="qrPopover" style="display:none;position:absolute;right:0;top:36px;background:var(--surface);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px;z-index:150;text-align:center;box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 0 24px rgba(255,255,255,0.12),0 8px 32px rgba(0,0,0,0.6)">
        <img id="qrImg" src="" style="width:168px;height:168px;border-radius:8px;display:block">
        <div id="qrUrl" style="font-size:10px;color:var(--muted);margin-top:10px;word-break:break-all;width:168px"></div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- System warning banner -->
    <div class="sys-banner" id="sysBanner">
      <div class="sys-banner-inner" id="sysBannerInner">
        <span id="sysBannerIcon">⚠️</span>
        <span id="sysBannerMsg"></span>
      </div>
    </div>

    <div class="section-title" style="margin-top:0">Services</div>
    <div class="filter-bar">
      <button class="filter-btn active" id="f-all"  onclick="setFilter('all')">All</button>
      <button class="filter-btn"        id="f-up"   onclick="setFilter('up')">Up</button>
      <button class="filter-btn"        id="f-down" onclick="setFilter('down')">Down</button>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:33%;text-align:left">App</th>
          <th style="width:34%;text-align:center">Address</th>
          <th style="width:33%;text-align:right">Checked</th>
        </tr>
      </thead>
      <tbody id="appTable"><tr><td colspan="3" class="no-apps">Loading...</td></tr></tbody>
    </table>
  </div>
</main>

<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <span class="dot" id="modalDot"></span>
      <span class="modal-title" id="modalTitle"></span>
    </div>
    <div class="modal-rows" id="modalRows"></div>
  </div>
</div>

<script>
let apps = [];
let filter = 'all';

async function load() {
  const res = await fetch('/api/status');
  const data = await res.json();
  apps = data.apps;
renderTable();
}

function setFilter(f) {
  filter = f;
  document.getElementById('f-all').className  = 'filter-btn' + (f === 'all'  ? ' active' : '');
  document.getElementById('f-up').className   = 'filter-btn' + (f === 'up'   ? ' active-up' : '');
  document.getElementById('f-down').className = 'filter-btn' + (f === 'down' ? ' active-down' : '');
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('appTable');
  const visible = filter === 'all' ? apps : apps.filter(a => a.status === filter);
  if (!visible.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="no-apps">No apps</td></tr>`;
    return;
  }
  tbody.innerHTML = visible.map(app => {
    const isDown = app.status === 'down';
    const port = app.localUrl ? new URL(app.localUrl).port : null;
    return `
    <tr id="row-${app.id}" onclick="openModal(apps.find(a=>a.id==='${app.id}'))">
      <td>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="dot ${app.status}"></span>
          ${faviconImg(app.id)}
          <div>
            <a class="app-name" href="${app.lanUrl || app.localUrl || '#'}" target="_blank" onclick="event.stopPropagation()">${app.name}</a>
            ${isDown ? `<div class="down-detail">port ${port || '?'} not responding — click to start</div>` : ''}
          </div>
        </div>
      </td>
      <td style="text-align:center"><a href="${app.lanUrl || app.localUrl || '#'}" target="_blank" onclick="event.stopPropagation()" style="color:var(--text);font-size:11px;text-decoration:none">${(app.lanUrl || app.localUrl || '').replace(/^https?:\/\//, '') || '—'}</a></td>
      <td style="text-align:right;color:var(--muted);font-size:11px">${app.lastChecked ? new Date(app.lastChecked).toLocaleTimeString() : '—'}</td>
    </tr>`;
  }).join('');
}

const FAVICONS = {
  'bheng':       '/favicons/bheng.png',
  'mermaid':     '/favicons/mermaid.svg',
  'stickies':    '/favicons/stickies.png',
  'ideas':       '/favicons/ideas.svg',
  '3pi-poc':     '/favicons/3pi-poc.png',
  '3pi':         '/favicons/3pi.svg',
  'drop':        '/favicons/drop.svg',
  'drop-web':    '/favicons/drop.svg',
  'claude-live': '/favicons/claude-live.svg',
  'recap':       '/favicons/recap.svg',
  'tools':       '/favicons/tools.svg',
};

function faviconImg(id) {
  const src = FAVICONS[id];
  if (!src) return '';
  return `<img src="${src}" width="24" height="24" style="border-radius:5px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'">`;
}

async function startApp(id, btn) {
  btn.textContent = '…';
  btn.disabled = true;
  try {
    await fetch('/api/start/' + id, { method: 'POST' });
    btn.textContent = '✓ Started';
    setTimeout(() => load(), 3000);
  } catch {
    btn.textContent = 'err';
    btn.disabled = false;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- SSE ---
const es = new EventSource('/api/events');
es.onmessage = e => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'update') {
    const app = apps.find(a => a.id === msg.id);
    if (app) { app.status = msg.status; renderTable(); }
  }
  if (msg.type === 'reload') { location.reload(); }
};

// --- Modal ---
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function pathVal(p) {
  if (!p) return null;
  return `<span style="font-size:11px;word-break:break-all;font-family:'SF Mono',monospace">${escHtml(p)}</span>
    <button class="copy-btn" onclick="copyText('${p}', this)" title="Copy">⎘</button>`;
}

function openModal(app) {
  document.getElementById('modalDot').className = 'dot ' + app.status;
  document.getElementById('modalTitle').innerHTML = `${faviconImg(app.id) ? faviconImg(app.id) + ' ' : ''}${escHtml(app.name)}`;

  const statusLabel = { up: '🟢 Up', down: '🔴 Down', unknown: '⚪ Unknown' }[app.status] || app.status;
  const port = app.localUrl ? new URL(app.localUrl).port : null;

  const isDown = app.status === 'down';
  const rows = [
    ['⬤ Status', `<span class="status-text ${app.status}">${statusLabel}</span>${isDown && app.launchAgent ? ` &nbsp;<button class="start-btn" onclick="startApp('${app.id}',this);closeModal()">▶ Start</button>` : ''}`],
    app.lastChecked ?     ['🕐 Checked',     new Date(app.lastChecked).toLocaleString()] : null,
    port ?                ['🔌 Port',         port] : null,
    app.repo ?            ['🐙 GitHub',       `<a href="${app.repo}" target="_blank" onclick="event.stopPropagation()">⇗ ${app.repo.replace('https://github.com/','')}</a>`] : null,
    app.prodUrl ?         ['🚀 Prod',         `<a href="${app.prodUrl}" target="_blank" onclick="event.stopPropagation()">${app.prodUrl.replace('https://','')}</a>`] : null,
    app.localUrl ?        ['🌐 Local',        `<a href="${app.localUrl}" target="_blank" onclick="event.stopPropagation()">${app.localUrl}</a>`] : null,
    app.caddyUrl ?        ['🔗 Caddy',        `<a href="${app.caddyUrl}" target="_blank" onclick="event.stopPropagation()">${app.caddyUrl}</a>`] : null,
    app.localPath ?       ['📁 Path',         pathVal(app.localPath)] : null,
    app.logPath ?         ['📄 Log',          pathVal(app.logPath)] : null,
  ].filter(Boolean);

  document.getElementById('modalRows').innerHTML = rows.map(([k, v]) => `
    <div class="modal-row">
      <span class="modal-key">${k}</span>
      <span class="modal-val">${v}</span>
    </div>
  `).join('');

  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalBackdrop')) return;
  document.getElementById('modalBackdrop').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalBackdrop').classList.remove('open');
});

// --- QR ---
let qrLoaded = false;
async function toggleQR() {
  const pop = document.getElementById('qrPopover');
  const btn = document.getElementById('qrBtn');
  if (pop.style.display !== 'none') {
    pop.style.display = 'none';
    btn.style.opacity = '0.35';
    return;
  }
  if (!qrLoaded) {
    const data = await fetch('/api/qr').then(r => r.json());
    document.getElementById('qrImg').src = data.dataUrl;
    document.getElementById('qrUrl').textContent = data.url;
    qrLoaded = true;
  }
  pop.style.display = 'block';
  btn.style.opacity = '1';
}
document.addEventListener('click', e => {
  const pop = document.getElementById('qrPopover');
  const btn = document.getElementById('qrBtn');
  if (!pop.contains(e.target) && !btn.contains(e.target)) {
    pop.style.display = 'none';
    btn.style.opacity = '0.35';
  }
});

load();
setInterval(load, 15000);

// --- System / memory monitoring ---
function fmtMem(mb) {
  if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
  return Math.round(mb) + ' MB';
}

function memZone(mb) {
  if (mb > 8192) return 'critical';
  if (mb > 4096) return 'red';
  if (mb > 1536) return 'yellow';
  return 'green';
}

function renderSystem(data) {
  const { stats, procs } = data;

  // --- Header indicators ---
  const claudeProcsH = procs.filter(p => p.type === 'claude');
  const chromeProcsH = procs.filter(p => p.type === 'chrome');
  const claudeMbH = claudeProcsH.reduce((s, p) => s + p.memMb, 0);
  const chromeMbH = chromeProcsH.reduce((s, p) => s + p.memMb, 0);
  const claudeZoneH = memZone(claudeMbH);
  const chromeZoneH = chromeMbH > 4096 ? 'red' : chromeMbH > 2048 ? 'yellow' : 'green';
  document.getElementById('headerIndicators').innerHTML = `
    <div class="hdr-ind">
      <img src="/favicons/claude-mascot.svg" width="18" height="18" style="image-rendering:pixelated">
      <span class="hdr-ind-val" style="color:${claudeZoneH==='green'?'var(--text)':claudeZoneH==='yellow'?'#f59e0b':claudeZoneH==='red'?'#ef4444':'#ff6b6b'}">${fmtMem(claudeMbH)}</span>
    </div>
    <div class="hdr-ind">
      <img src="/favicons/chrome.svg" width="18" height="18">
      <span class="hdr-ind-val" style="color:${chromeZoneH==='green'?'var(--text)':chromeZoneH==='yellow'?'#f59e0b':'#ef4444'}">${fmtMem(chromeMbH)}</span>
    </div>`;

  // --- System warning banner ---
  const availMb = stats.ram.availMb;
  const pressure = stats.ram.pressure;
  const banner = document.getElementById('sysBanner');
  const bannerInner = document.getElementById('sysBannerInner');
  const bannerMsg = document.getElementById('sysBannerMsg');
  let bannerText = '';
  let bannerClass = '';

  if (stats.swap.climbing) {
    bannerText = 'Swap is climbing fast — offloading to disk, things will slow down';
    bannerClass = 'critical';
  } else if (pressure === 'critical') {
    bannerText = `macOS memory pressure: CRITICAL — ${fmtMem(availMb)} available, swap may start`;
    bannerClass = 'critical';
  } else if (pressure === 'warn') {
    bannerText = `macOS memory pressure: WARNING — ${fmtMem(availMb)} available`;
    bannerClass = 'yellow';
  } else if (stats.swap.usedMb > 512) {
    bannerText = `Swap in use: ${fmtMem(stats.swap.usedMb)} — memory was compressed to disk`;
    bannerClass = 'yellow';
  }

  if (bannerText) {
    bannerMsg.textContent = bannerText;
    bannerInner.className = 'sys-banner-inner ' + bannerClass;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}


async function loadSystem() {
  try {
    const data = await fetch('/api/system').then(r => r.json());
    renderSystem(data);
  } catch {}
}

loadSystem();
setInterval(loadSystem, 3000);
</script>
</body>
</html>
