<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>READMEs — Local Apps</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="theme-color" content="#0f1117">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #222222;
    --text: #c9c9c9;
    --muted: #555555;
    --accent: #c9c9c9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

  /* Sidebar */
  .sidebar { position:fixed; top:0; left:0; bottom:0; width:200px; background:#111; border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
  .sidebar-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sidebar-ip { font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0.02em; }
  .sidebar-nav { padding:12px 8px; display:flex; flex-direction:column; gap:1px; }
  .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; font-size:12px; color:var(--muted); text-decoration:none; transition:all 0.12s; font-weight:500; }
  .sidebar-nav a:hover { background:rgba(255,255,255,0.05); color:var(--text); }
  .sidebar-nav a.active { background:rgba(255,255,255,0.08); color:#fff; font-weight:600; }
  .sidebar-nav a svg { opacity:0.45; flex-shrink:0; }
  .sidebar-nav a.active svg { opacity:0.9; }
  .sidebar-footer { margin-top:auto; padding:12px 16px; border-top:1px solid var(--border); font-size:10px; color:var(--muted); }
  .page-body { margin-left:200px; }
  .hamburger { display:none; background:none; border:none; color:var(--text); cursor:pointer; padding:4px; line-height:1; position:relative; width:24px; height:24px; }
  .hamburger .bar { position:absolute; left:3px; width:18px; height:1.5px; background:var(--text); border-radius:1px; transition:transform 0.3s ease, opacity 0.3s ease; }
  .hamburger .bar:nth-child(1) { top:6px; }
  .hamburger .bar:nth-child(2) { top:11px; }
  .hamburger .bar:nth-child(3) { top:16px; }
  .hamburger.open .bar:nth-child(1) { top:11px; transform:rotate(45deg); }
  .hamburger.open .bar:nth-child(2) { opacity:0; }
  .hamburger.open .bar:nth-child(3) { top:11px; transform:rotate(-45deg); }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
  @media (max-width: 768px) {
    .sidebar { transform:translateX(-100%); transition:transform 0.2s ease; }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.open { display:block; }
    .page-body { margin-left:0; }
    .hamburger { display:flex; }
  }

  .wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
  header { padding: 20px 0; border-bottom: 1px solid var(--border); }

  /* App selector */
  .app-tabs { display:flex; gap:6px; flex-wrap:wrap; padding:16px 0; border-bottom:1px solid var(--border); }
  .app-tab { display:flex; align-items:center; gap:8px; padding:6px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:inherit; font-size:11px; cursor:pointer; transition:all 0.12s; font-weight:500; }
  .app-tab:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
  .app-tab.active { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); color:#fff; font-weight:600; }
  .app-tab img { width:20px; height:20px; border-radius:5px; }

  /* README content */
  .readme-wrap { padding:24px 0 60px; }
  .readme-content { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; line-height:1.7; }
  .readme-content h1 { font-size:20px; font-weight:700; color:#fff; margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:12px; }
  .readme-content h2 { font-size:15px; font-weight:700; color:#e0e0e0; margin-top:28px; margin-bottom:10px; }
  .readme-content h3 { font-size:13px; font-weight:600; color:#ccc; margin-top:20px; margin-bottom:8px; }
  .readme-content p { font-size:12px; color:rgba(255,255,255,0.6); margin-bottom:10px; }
  .readme-content ul, .readme-content ol { font-size:12px; color:rgba(255,255,255,0.6); padding-left:20px; margin-bottom:10px; }
  .readme-content li { margin-bottom:4px; }
  .readme-content code { background:rgba(255,255,255,0.06); padding:2px 6px; border-radius:4px; font-size:11px; font-family:'SF Mono','Fira Code',monospace; }
  .readme-content pre { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin:10px 0 16px; overflow-x:auto; }
  .readme-content pre code { background:none; padding:0; font-size:11px; color:rgba(255,255,255,0.5); line-height:1.6; }
  .readme-content table { width:100%; border-collapse:collapse; margin:10px 0 16px; font-size:11px; }
  .readme-content th { text-align:left; padding:8px 12px; border-bottom:2px solid var(--border); color:rgba(255,255,255,0.7); font-weight:600; }
  .readme-content td { padding:8px 12px; border-bottom:1px solid var(--border); color:rgba(255,255,255,0.5); }
  .readme-content hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .readme-content a { color:#818cf8; text-decoration:none; }
  .readme-content a:hover { text-decoration:underline; }
  .readme-content blockquote { border-left:3px solid rgba(255,255,255,0.1); padding-left:14px; color:rgba(255,255,255,0.4); margin:10px 0; font-style:italic; }
  .readme-content strong { color:rgba(255,255,255,0.8); }

  .readme-meta { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .readme-meta img { width:36px; height:36px; border-radius:9px; }
  .readme-meta .meta-name { font-size:14px; font-weight:600; color:#fff; }
  .readme-meta .meta-repo { font-size:10px; color:var(--muted); }
  .readme-meta .meta-repo a { color:#818cf8; text-decoration:none; }

  .no-readme { text-align:center; padding:60px; color:var(--muted); font-style:italic; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-ip" id="sidebarIp">10.0.0.218</span>
  </div>
  <div class="sidebar-nav">
    <a href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Status
    </a>
    <a href="/crons.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Cron Jobs
    </a>
    <a href="/gallery.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Screenshots
    </a>
    <a href="/logos.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Logos
    </a>
    <a href="/readmes.html" class="active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      READMEs
    </a>
    <a href="/docs.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      API Docs
    </a>
  </div>
  <div class="sidebar-footer">localhost:9876</div>
</nav>

<div class="page-body">
<header>
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
      <div>
        <h1 style="font-size:18px;font-weight:700;color:#fff">READMEs</h1>
        <div id="appCount" style="color:var(--muted);font-size:11px;margin-top:2px"></div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="app-tabs" id="appTabs"></div>
    <div class="readme-wrap" id="readmeWrap">
      <div class="no-readme">Select an app above</div>
    </div>
  </div>
</main>
</div>

<script>
const FAVICONS = {
  'bheng':       '/favicons/bheng.png',
  'tools':       '/favicons/tools.png',
  'diagrams':    '/favicons/diagrams.png',
  'claude':      '/favicons/claude.png',
  'stickies':    '/favicons/stickies.png',
  'mindmaps':    '/favicons/mindmaps.png',
  'safe':        '/favicons/safe.png',
  'drop':        '/favicons/drop.png',
  'ai-spinner':  '/favicons/ai-spinner.png',
  'moments':     '/favicons/moments.png',
  'frames':      '/favicons/frames.png',
  'audit':       '/favicons/audit.png',
  'workflows':   '/favicons/workflows.png',
  'system-design':'/favicons/system-design.png',
};

const _v = Date.now();
let apps = [];
let activeApp = null;

async function load() {
  const res = await fetch('/api/apps');
  apps = await res.json();
  document.getElementById('appCount').textContent = apps.length + ' apps';

  const tabs = document.getElementById('appTabs');
  tabs.innerHTML = apps.map(app => {
    const icon = FAVICONS[app.id] || '';
    return `<button class="app-tab" data-id="${app.id}" onclick="selectApp('${app.id}')">
      ${icon ? `<img src="${icon}?v=${_v}" alt="">` : ''}
      ${esc(app.name || app.id)}
    </button>`;
  }).join('');

  // Auto-select first or from hash
  const hash = location.hash.slice(1);
  const target = hash && apps.find(a => a.id === hash) ? hash : (apps[0]?.id || null);
  if (target) selectApp(target);
}

async function selectApp(id) {
  activeApp = id;
  location.hash = id;

  document.querySelectorAll('.app-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === id);
  });

  const wrap = document.getElementById('readmeWrap');
  wrap.innerHTML = '<div class="no-readme">Loading...</div>';

  try {
    const res = await fetch(`/api/readme/${id}`);
    if (!res.ok) throw new Error('No README');
    const data = await res.json();

    const app = apps.find(a => a.id === id);
    const icon = FAVICONS[id] || '';
    const repo = app?.repo || `https://github.com/bunlongheng/${id}`;

    wrap.innerHTML = `
      <div class="readme-meta">
        ${icon ? `<img src="${icon}?v=${_v}" alt="">` : ''}
        <div>
          <div class="meta-name">${esc(app?.name || id)}</div>
          <div class="meta-repo"><a href="${repo}" target="_blank">${repo}</a></div>
        </div>
      </div>
      <div class="readme-content">${data.html}</div>`;
  } catch (e) {
    wrap.innerHTML = '<div class="no-readme">No README.md found for this app</div>';
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSidebar() {
  const open = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open', open);
  document.getElementById('hamburgerBtn').classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('open');
}

load();
</script>
</body>
</html>
