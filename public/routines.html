<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routines — Local Apps</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="theme-color" content="#0f1117">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #222222;
    --text: #c9c9c9;
    --muted: #555555;
    --up: #4ade80;
    --down: #f87171;
    --accent: #c9c9c9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }

  /* Sidebar */
  .sidebar { position:fixed; top:0; left:0; bottom:0; width:200px; background:#111; border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:100; }
  .sidebar-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sidebar-ip { font-size:11px; color:var(--muted); font-weight:500; letter-spacing:0.02em; }
  .sidebar-nav { padding:12px 8px; display:flex; flex-direction:column; gap:1px; }
  .sidebar-nav a { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; font-size:12px; color:var(--muted); text-decoration:none; transition:all 0.12s; font-weight:500; }
  .sidebar-nav a:hover { background:rgba(255,255,255,0.05); color:var(--text); }
  .sidebar-nav a.active { background:rgba(255,255,255,0.08); color:#fff; font-weight:600; }
  .sidebar-nav a svg { opacity:0.45; flex-shrink:0; }
  .sidebar-nav a.active svg { opacity:0.9; }
  .sidebar-footer { margin-top:auto; padding:12px 16px; border-top:1px solid var(--border); font-size:10px; color:var(--muted); }
  .page-body { margin-left:200px; }
  .hamburger { display:none; background:none; border:none; color:var(--text); cursor:pointer; padding:4px; line-height:1; position:relative; width:24px; height:24px; }
  .hamburger .bar { position:absolute; left:3px; width:18px; height:1.5px; background:var(--text); border-radius:1px; transition:transform 0.3s ease, opacity 0.3s ease; }
  .hamburger .bar:nth-child(1) { top:6px; }
  .hamburger .bar:nth-child(2) { top:11px; }
  .hamburger .bar:nth-child(3) { top:16px; }
  .hamburger.open .bar:nth-child(1) { top:11px; transform:rotate(45deg); }
  .hamburger.open .bar:nth-child(2) { opacity:0; }
  .hamburger.open .bar:nth-child(3) { top:11px; transform:rotate(-45deg); }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
  @media (max-width: 768px) {
    .sidebar { transform:translateX(-100%); transition:transform 0.2s ease; }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.open { display:block; }
    .page-body { margin-left:0; }
    .hamburger { display:flex; }
  }

  .wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; }
  header { padding: 20px 0; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }

  /* Cron rows */
  .cron-list { padding: 10px 0; }
  .cron-row { border-bottom: 1px solid var(--border); }
  .cron-header { display:grid; grid-template-columns:100px 36px 1fr 100px; align-items:center; gap:8px; padding:12px 0; cursor:pointer; user-select:none; }
  .cron-header:hover { background:rgba(255,255,255,0.02); }
  .cron-chevron { color:var(--muted); font-size:10px; width:14px; text-align:center; flex-shrink:0; transition:transform 0.15s; }
  .cron-row.open .cron-chevron { transform:rotate(90deg); }
  .cron-icon { color:#6366f1; flex-shrink:0; }
  .cron-name { font-size:13px; font-weight:400; }
  .cron-desc { font-size:11px; color:var(--muted); margin-top:1px; }
  .cron-meta { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .cron-badge { font-size:9px; padding:2px 8px; border-radius:10px; background:rgba(99,102,241,0.12); color:#818cf8; font-weight:600; letter-spacing:0.03em; }
  .cron-time { font-size:11px; color:var(--muted); white-space:nowrap; }
  .cron-body { display:none; padding:0 0 14px 26px; }
  .cron-row.open .cron-body { display:block; }
  .cron-log-path { font-size:11px; color:var(--muted); margin-bottom:8px; }
  .cron-log { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-size:10px; font-family:'SF Mono','Fira Code',monospace; color:var(--muted); max-height:300px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; line-height:1.6; }
  .cron-summary { margin-top:10px; }
  .cron-summary-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
  .no-data { text-align:center; padding:60px; color:var(--muted); }

  /* Toggle switch */
  .cron-toggle { position:relative; width:34px; height:18px; flex-shrink:0; }
  .cron-toggle input { opacity:0; width:0; height:0; }
  .cron-toggle .slider { position:absolute; inset:0; background:rgba(255,255,255,0.1); border-radius:9px; cursor:pointer; transition:background 0.2s; }
  .cron-toggle .slider:before { content:''; position:absolute; width:14px; height:14px; left:2px; bottom:2px; background:#555; border-radius:50%; transition:all 0.2s; }
  .cron-toggle input:checked + .slider { background:rgba(74,222,128,0.25); }
  .cron-toggle input:checked + .slider:before { transform:translateX(16px); background:var(--up); }
  .cron-row.disabled { opacity:1; }

  /* Dropdown menu */
  .cron-menu-wrap { position:relative; flex-shrink:0; }
  .cron-menu-btn { background:none; border:none; color:var(--muted); cursor:pointer; padding:4px 6px; border-radius:4px; font-size:16px; line-height:1; letter-spacing:2px; transition:all 0.15s; }
  .cron-menu-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }
  .cron-menu { display:none; position:absolute; right:0; top:28px; background:#1a1a1a; border:1px solid var(--border); border-radius:8px; min-width:160px; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.5); overflow:hidden; }
  .cron-menu.open { display:block; }
  .cron-menu-item { display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:11px; color:var(--text); cursor:pointer; transition:background 0.1s; border:none; background:none; width:100%; text-align:left; font-family:inherit; }
  .cron-menu-item:hover { background:rgba(255,255,255,0.06); }
  .cron-menu-item svg { opacity:0.5; flex-shrink:0; }
  .cron-menu-sep { border-top:1px solid var(--border); margin:2px 0; }
  /* Modal */
  .cron-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; backdrop-filter:blur(4px); }
  .cron-modal-overlay.open { display:flex; align-items:center; justify-content:center; }
  .cron-modal { background:#161616; border:1px solid var(--border); border-radius:12px; width:90%; max-width:520px; max-height:80vh; overflow-y:auto; padding:0; box-shadow:0 16px 48px rgba(0,0,0,0.5); color:#fff; }
  .cron-modal-header { display:flex; align-items:center; gap:12px; padding:20px 20px 16px; border-bottom:1px solid var(--border); }
  .cron-modal-body { padding:16px 20px 20px; }
  .cron-modal-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .cron-modal-row:last-child { border-bottom:none; }
  .cron-modal-label { font-size:11px; color:rgba(255,255,255,0.7); }
  .cron-modal-value { font-size:12px; color:#fff; font-weight:500; text-align:right; }
  .cron-modal-actions { display:flex; gap:8px; padding:12px 20px; border-top:1px solid var(--border); }
  .cron-modal-btn { flex:1; padding:8px; border:1px solid var(--border); border-radius:6px; background:none; color:#fff; font-family:inherit; font-size:11px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .cron-modal-btn:hover { background:rgba(255,255,255,0.06); border-color:var(--text); }
  .cron-modal-btn.danger { color:var(--down); }
  .cron-modal-btn.danger:hover { background:rgba(248,113,113,0.1); border-color:var(--down); }

  /* Tabs */
  .cron-tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:10px 20px; cursor:pointer; transition:all 0.15s; }
  .cron-tab:hover { color:var(--text); }
  .cron-tab.active { color:#fff; border-bottom-color:#fff; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-ip" id="sidebarIp">10.0.0.218</span>
  </div>
  <div class="sidebar-nav">
    <a href="/" id="nav-status">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Status
    </a>
    <a href="/routines.html" class="active" id="nav-crons">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Routines
    </a>
    <a href="/gallery.html" id="nav-gallery">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Screenshots
    </a>
    <a href="/apps.html" id="nav-logos">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Apps
    </a>
    <a href="/readmes.html" id="nav-readmes">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      READMEs
    </a>
    <a href="/docs.html" id="nav-docs">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      API Docs
    </a>
  </div>
  <div class="sidebar-footer">localhost:9876</div>
</nav>

<div class="page-body">
<header>
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
      <div>
        <h1>Routines</h1>
        <div id="cronCount" style="color:var(--muted);font-size:11px;margin-top:2px"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <label class="cron-toggle" id="toggleAllWrap" style="cursor:pointer" title="Toggle all crons">
        <input type="checkbox" id="toggleAllCb" checked onchange="toggleAll(this.checked)">
        <span class="slider"></span>
      </label>
      <button onclick="loadCrons()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:11px;padding:5px 14px;border-radius:6px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.borderColor='var(--text)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">Refresh</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-top:12px">
      <button class="cron-tab active" id="tab-config" onclick="switchTab('config')">Configuration</button>
      <button class="cron-tab" id="tab-logs" onclick="switchTab('logs')">Logs</button>
      <button class="cron-tab" id="tab-tokens" onclick="switchTab('tokens')">Token Budget</button>
    </div>
    <div id="panel-config">
      <div class="cron-list" id="cronList">
        <div class="no-data">Loading...</div>
      </div>
    </div>
    <div id="panel-logs" style="display:none">
      <div class="cron-list" id="logTimeline"></div>
    </div>
    <div id="panel-tokens" style="display:none">
      <div id="costSummary" style="margin:16px 0;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:10px;color:var(--muted)">worst-case (all apps fail every run) &middot; Max plan $200/m</span>
        </div>
        <div id="costGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px"></div>
      </div>
      <div class="cron-list" id="tokenList"></div>
    </div>
  </div>
<div class="cron-modal-overlay" id="cronModal" onclick="if(event.target===this)closeCronModal()">
  <div class="cron-modal" id="cronModalContent"></div>
</div>
</main>
</div>

<script src="/shared.js"></script>
<script>
let crons = [];
let activeTab = 'config';

function switchTab(tab) {
  activeTab = tab;
  ['config','logs','tokens'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
  });
  if (tab === 'logs') renderLogs();
}
const AGENT_ICONS = {
  'agent-snow':1,'agent-blaze':2,'agent-arrow':3,'agent-venus':4,'agent-zap':5,
  'agent-frost':6,'agent-blitz':7,'agent-earth':8,'agent-pulse':9,'agent-sand':10,
  'agent-shadow':11,'agent-rock':12,
  'nightly-tests':7,'nightly-crawler':3,'nightly-screenshots':6,'nightly-gifs':12,
  'deep-audit':8,'nightly-scan':11,'nightly-summary':1,'health-check-fix':1,
  'git-pull-all':9
};
// Snow=ice, Blaze=red, Arrow=pink, Venus=orange, Zap=yellow, Frost=cyan, Blitz=blue, Earth=green, Pulse=purple, Sand=orange, Shadow=gray, Rock=gray
const AGENT_COLORS = {
  1:'#a5f3fc',2:'#ef4444',3:'#ec4899',4:'#f97316',5:'#eab308',
  6:'#06b6d4',7:'#3b82f6',8:'#22c55e',9:'#a855f7',10:'#f97316',
  11:'#6b7280',12:'#78716c'
};

async function loadCrons() {
  try {
    const res = await fetch('/api/crons');
    const data = await res.json();
    crons = Array.isArray(data) ? data : (data.crons || []);
    document.getElementById('cronCount').textContent = crons.length + ' scheduled jobs';
    renderCostSummary();
    renderCrons();
    updateToggleAllBtn();
  } catch (e) {
    document.getElementById('cronList').innerHTML = '<div class="no-data">Failed to load cron data</div>';
  }
}

function renderCostSummary() {
  const withCost = crons.filter(c => c.cost);
  if (!withCost.length) { document.getElementById('costSummary').style.display = 'none'; return; }
  document.getElementById('costSummary').style.display = 'block';

  let totalDailyTok = 0, claudeJobs = 0, freeJobs = 0;
  for (const c of crons) {
    if (c.cost) {
      const [, apps, runs, tokK] = c.cost;
      totalDailyTok += tokK * apps * runs;
      claudeJobs++;
    } else {
      freeJobs++;
    }
  }
  const totalMonthlyTok = totalDailyTok * 30;

  document.getElementById('costGrid').innerHTML = `
    <div style="text-align:center">
      <div style="font-size:20px;font-weight:700;color:#eab308">${(totalDailyTok / 1000).toFixed(1)}M</div>
      <div style="font-size:10px;color:var(--muted)">tokens / day</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:20px;font-weight:700;color:#eab308">${(totalMonthlyTok / 1000).toFixed(0)}M</div>
      <div style="font-size:10px;color:var(--muted)">tokens / month</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:20px;font-weight:700;color:#fff">${claudeJobs}<span style="color:var(--muted);font-size:13px"> / ${claudeJobs + freeJobs}</span></div>
      <div style="font-size:10px;color:var(--muted)">use Claude</div>
    </div>
  `;

  // Render token rows sorted by usage (highest first)
  const tokCrons = crons.filter(c => c.cost).map(c => {
    const tok = cronTokDaily(c);
    return { ...c, tok };
  }).sort((a, b) => b.tok - a.tok);
  const maxTok = tokCrons.length ? tokCrons[0].tok : 0;

  document.getElementById('tokenList').innerHTML = tokCrons.map(c => {
    const pct = maxTok > 0 ? Math.round((c.tok / maxTok) * 100) : 0;
    const color = pct > 75 ? '#ef4444' : pct > 40 ? '#eab308' : '#4ade80';
    const label = (c.tok / 1000).toFixed(1) + 'M';
    const iconNum = AGENT_ICONS[c.id];
    return `
      <div style="display:grid;grid-template-columns:36px 1fr 140px 50px;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:center">
          ${iconNum ? `<img src="/agents/${iconNum}.png" width="28" height="28" style="border-radius:50%;border:2px solid ${AGENT_COLORS[iconNum]};box-shadow:0 0 6px ${AGENT_COLORS[iconNum]}40">` : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`}
        </div>
        <div>
          <div style="font-size:12px;${iconNum ? `color:${AGENT_COLORS[iconNum]}` : ''}">${escHtml(taskName(c))}</div>
          <div style="font-size:10px;color:var(--muted)">${c.cost[3]}K/agent x ${c.cost[1]} apps x ${c.cost[2]} runs</div>
        </div>
        <div style="height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
        <div style="font-size:11px;font-weight:700;color:${color};text-align:right">${label}</div>
      </div>`;
  }).join('');
}

function renderLogs() {
  const el = document.getElementById('logTimeline');
  const sorted = [...crons].filter(c => c.lastRun).sort((a, b) => new Date(b.lastRun) - new Date(a.lastRun));
  if (!sorted.length) { el.innerHTML = '<div class="no-data">No logs yet</div>'; return; }

  el.innerHTML = sorted.map((c, i) => {
    const iconNum = AGENT_ICONS[c.id];
    const agentColor = iconNum ? AGENT_COLORS[iconNum] : '#6366f1';
    const ago = timeAgo(c.lastRun);
    const ts = new Date(c.lastRun).toLocaleString();
    const lines = (c.lastLines || '').trim();
    const hasError = lines.toLowerCase().includes('error') || lines.toLowerCase().includes('fail');
    const borderColor = hasError ? '#ef4444' : '#4ade80';
    const expanded = i === 0;
    return `
      <div style="margin-bottom:6px;border:1px solid ${borderColor}40;border-radius:8px;background:var(--surface);overflow:hidden;box-shadow:0 0 8px ${borderColor}15">
        <div onclick="toggleLogCard(this)" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none">
          ${iconNum ? `<img src="/agents/${iconNum}.png" width="28" height="28" style="border-radius:50%;border:2px solid ${agentColor};box-shadow:0 0 6px ${agentColor}40;flex-shrink:0">` : `<div style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>`}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;color:var(--text)">${escHtml(taskName(c))}</span>
            </div>
          </div>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap">${ago}</span>
          <span class="log-chevron" style="font-size:10px;color:var(--muted);transition:transform 0.15s;${expanded ? 'transform:rotate(90deg)' : ''}">\u25B6</span>
        </div>
        <div class="log-expand" style="${expanded ? '' : 'display:none'}">
          <div style="padding:0 14px 4px;font-size:10px;color:rgba(255,255,255,0.4)">${ts}</div>
          ${lines ? `<div style="margin:4px 14px 12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:10px 12px;font-size:10px;color:rgba(255,255,255,0.8);max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6;font-family:'SF Mono','Fira Code',monospace">${escHtml(lines)}</div>` : '<div style="padding:4px 14px 12px;font-size:10px;color:rgba(255,255,255,0.3);font-style:italic">No output</div>'}
        </div>
      </div>`;
  }).join('');
}

function toggleLogCard(header) {
  const expand = header.nextElementSibling;
  const chevron = header.querySelector('.log-chevron');
  const isOpen = expand.style.display !== 'none';
  expand.style.display = isOpen ? 'none' : '';
  chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function cronTokDaily(c) {
  return c.cost ? (c.cost[3] * c.cost[1] * c.cost[2]) : 0;
}

function renderCrons() {
  const list = document.getElementById('cronList');
  if (!crons.length) {
    list.innerHTML = '<div class="no-data">No cron jobs configured</div>';
    return;
  }
  const maxTok = Math.max(...crons.map(cronTokDaily));
  list.innerHTML = crons.map(c => {
    const tok = cronTokDaily(c);
    const pct = maxTok > 0 ? Math.round((tok / maxTok) * 100) : 0;
    const tokLabel = tok > 0 ? (tok / 1000).toFixed(1) + 'M' : '';
    const hasLog = c.lastLines && c.lastLines.length > 0;
    const time = c.lastRun ? timeAgo(c.lastRun) : 'Never run';
    const summary = c.summaryData
      ? `<div class="cron-summary"><div class="cron-summary-label">Summary</div><div class="cron-log">${escHtml(typeof c.summaryData === 'string' ? c.summaryData : JSON.stringify(c.summaryData, null, 2))}</div></div>`
      : '';
    return `
      <div class="cron-row${c.enabled === false ? ' disabled' : ''}" id="cron-${c.id}">
        <div class="cron-header" onclick="openCronModal('${c.id}')">
          <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
            <label class="cron-toggle" title="${c.enabled !== false ? 'Enabled — click to disable' : 'Disabled — click to enable'}">
              <input type="checkbox" ${c.enabled !== false ? 'checked' : ''} onchange="toggleEnabled('${c.id}', this)">
              <span class="slider"></span>
            </label>
            <span style="font-size:9px;color:var(--muted);white-space:nowrap;min-width:50px">${escHtml(c.hour || '')}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:center">
            ${AGENT_ICONS[c.id] ? `<img src="/agents/${AGENT_ICONS[c.id]}.png" width="32" height="32" style="border-radius:50%;border:2px solid ${AGENT_COLORS[AGENT_ICONS[c.id]]};box-shadow:0 0 8px ${AGENT_COLORS[AGENT_ICONS[c.id]]}40,0 0 16px ${AGENT_COLORS[AGENT_ICONS[c.id]]}20">` : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`}
          </div>
          <div style="min-width:0">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="cron-name">${escHtml(taskName(c))}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:5px" ${tok > 0 ? `title="${c.cost[3]}K tok/agent x ${c.cost[1]} apps x ${c.cost[2]} runs/day = ${tokLabel}"` : ''}>
            <div style="flex:1;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
              ${tok > 0 ? `<div style="width:${pct}%;height:100%;background:${pct > 75 ? '#ef4444' : pct > 40 ? '#eab308' : '#4ade80'};border-radius:2px"></div>` : ''}
            </div>
            <span style="font-size:9px;color:${tok > 0 ? (pct > 75 ? '#ef4444' : pct > 40 ? '#eab308' : '#4ade80') : 'var(--muted)'};font-weight:600;white-space:nowrap">${tok > 0 ? tokLabel : '0'}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function toggleAll(enable) {
  try {
    await fetch('/api/crons/toggle-all', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ enable }) });
    await loadCrons();
  } catch {}
}

function updateToggleAllBtn() {
  const toggleable = crons.filter(c => c.id !== 'auto-restart');
  const allEnabled = toggleable.length > 0 && toggleable.every(c => c.enabled !== false);
  document.getElementById('toggleAllCb').checked = allEnabled;
}

function openCronModal(id) {
  const c = crons.find(x => x.id === id);
  if (!c) return;
  const iconNum = AGENT_ICONS[c.id];
  const color = iconNum ? AGENT_COLORS[iconNum] : '#6366f1';
  const tok = cronTokDaily(c);
  const tokLabel = tok > 0 ? (tok / 1000).toFixed(1) + 'M tok/day' : 'None';
  const time = c.lastRun ? new Date(c.lastRun).toLocaleString() : 'Never';
  const ago = c.lastRun ? timeAgo(c.lastRun) : '';
  const lines = (c.lastLines || '').trim();

  document.getElementById('cronModalContent').innerHTML = `
    <div class="cron-modal-header">
      ${iconNum ? `<img src="/agents/${iconNum}.png" width="40" height="40" style="border-radius:50%;border:2px solid ${color};box-shadow:0 0 10px ${color}40">` : `<div style="width:40px;height:40px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>`}
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;color:${color}">${escHtml(taskName(c))}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.6)">${escHtml(c.desc || '')}</div>
      </div>
      <button onclick="closeCronModal()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1">&times;</button>
    </div>
    <div class="cron-modal-body">
      <div class="cron-modal-row">
        <span class="cron-modal-label">Schedule</span>
        <span class="cron-modal-value">${escHtml(c.hour || 'N/A')}</span>
      </div>
      <div class="cron-modal-row">
        <span class="cron-modal-label">Status</span>
        <span class="cron-modal-value" style="color:${c.enabled !== false ? '#4ade80' : '#f87171'}">${c.enabled !== false ? 'Enabled' : 'Disabled'}</span>
      </div>
      <div class="cron-modal-row">
        <span class="cron-modal-label">Auto-fix</span>
        <span class="cron-modal-value" style="color:${c.autoFix ? '#4ade80' : 'var(--muted)'}">${c.autoFix ? 'Yes' : 'No'}</span>
      </div>
      <div class="cron-modal-row">
        <span class="cron-modal-label">Token budget</span>
        <span class="cron-modal-value">${tokLabel}${c.cost ? ` (${c.cost[3]}K/agent x ${c.cost[1]} apps x ${c.cost[2]} runs)` : ''}</span>
      </div>
      <div class="cron-modal-row">
        <span class="cron-modal-label">Log file</span>
        <span class="cron-modal-value" style="font-size:10px">${escHtml(c.log || 'N/A')}</span>
      </div>
      <div class="cron-modal-row">
        <span class="cron-modal-label">Last run</span>
        <span class="cron-modal-value">${time}${ago ? ` (${ago})` : ''}</span>
      </div>
      ${lines ? `
        <div style="margin-top:12px">
          <div style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:600;margin-bottom:6px">RECENT OUTPUT</div>
          <div style="background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:10px;color:rgba(255,255,255,0.8);max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5;font-family:'SF Mono','Fira Code',monospace">${escHtml(lines)}</div>
        </div>` : ''}
    </div>
    <div class="cron-modal-actions">
      <button class="cron-modal-btn" onclick="closeCronModal();runCron('${c.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Run Now
      </button>
      <button class="cron-modal-btn" onclick="closeCronModal();viewLog('${c.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Full Log
      </button>
      <button class="cron-modal-btn danger" onclick="closeCronModal();clearLog('${c.id}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear Log
      </button>
    </div>`;
  document.getElementById('cronModal').classList.add('open');
}

function closeCronModal() {
  document.getElementById('cronModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCronModal(); });

function toggleMenu(id) {
  // Close all other menus
  document.querySelectorAll('.cron-menu.open').forEach(m => { if (m.id !== 'menu-' + id) m.classList.remove('open'); });
  document.getElementById('menu-' + id).classList.toggle('open');
}
document.addEventListener('click', () => document.querySelectorAll('.cron-menu.open').forEach(m => m.classList.remove('open')));

async function runCron(id) {
  try {
    await fetch(`/api/crons/${id}/run`, { method: 'POST' });
    const row = document.getElementById('cron-' + id);
    if (row) { row.style.background = 'rgba(74,222,128,0.08)'; setTimeout(() => row.style.background = '', 1500); }
  } catch {}
}

async function viewLog(id) {
  try {
    const res = await fetch(`/api/crons/${id}/log?lines=200`);
    const text = await res.text();
    const w = window.open('', '_blank', 'width=800,height=600');
    w.document.write(`<html><head><title>${id} log</title><style>body{background:#0d0d0d;color:#aaa;font:12px/1.6 'SF Mono',monospace;padding:16px;white-space:pre-wrap;word-break:break-all;}</style></head><body>${text.replace(/</g,'&lt;')}</body></html>`);
  } catch {}
}

async function clearLog(id) {
  if (!confirm(`Clear log for ${id}?`)) return;
  try {
    await fetch(`/api/crons/${id}/log`, { method: 'DELETE' });
    loadCrons();
  } catch {}
}

async function toggleEnabled(id, checkbox) {
  try {
    const res = await fetch(`/api/crons/${id}/toggle`, { method: 'POST' });
    const data = await res.json();
    const row = document.getElementById('cron-' + id);
    if (data.enabled) {
      row.classList.remove('disabled');
      checkbox.parentElement.title = 'Enabled — click to disable';
    } else {
      row.classList.add('disabled');
      checkbox.parentElement.title = 'Disabled — click to enable';
    }
  } catch (e) {
    checkbox.checked = !checkbox.checked; // revert on error
  }
}

function toggleCron(id) {
  document.getElementById('cron-' + id).classList.toggle('open');
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const secs = Math.floor(diff / 1000);
  if (secs < 60) return secs + 's ago';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function displayName(id) {
  return id.replace(/^agent-/, '').replace(/^nightly-/, '');
}

function taskName(c) {
  if (!c.desc) return displayName(c.id);
  return c.desc.replace(/^.*?\s—\s/, '');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSidebar() {
  const open = document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open', open);
  document.getElementById('hamburgerBtn').classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('open');
}

loadCrons();
</script>
</body>
</html>
