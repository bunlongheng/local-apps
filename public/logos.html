<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logos - Local Apps</title>
<style>
:root { --bg:#0e0e10; --surface:#18181b; --border:#27272a; --text:#e4e4e7; --muted:#71717a; --accent:#3b82f6; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

/* Sidebar - matches index.html */
.sidebar { width:180px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; bottom:0; z-index:10; }
.sidebar-header { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
.sidebar-ip { font-size:11px; color:var(--muted); font-family:'SF Mono',monospace; }
.sidebar-nav { padding:12px 8px; display:flex; flex-direction:column; gap:1px; }
.sidebar-nav a { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; font-size:12px; color:var(--muted); text-decoration:none; transition:all 0.12s; font-weight:500; }
.sidebar-nav a:hover { background:rgba(255,255,255,0.05); color:var(--text); }
.sidebar-nav a.active { background:rgba(255,255,255,0.08); color:#fff; font-weight:600; }
.sidebar-nav a svg { opacity:0.45; flex-shrink:0; }
.sidebar-nav a.active svg { opacity:0.9; }
.sidebar-footer { margin-top:auto; padding:12px 16px; border-top:1px solid var(--border); font-size:10px; color:var(--muted); font-family:'SF Mono',monospace; }

.main { margin-left:180px; flex:1; padding:32px; max-width:1100px; }
h1 { font-size:20px; font-weight:700; margin-bottom:24px; }

.logo-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; }
.logo-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color 0.15s; }
.logo-card:hover { border-color:rgba(255,255,255,0.15); }
.logo-header { display:flex; align-items:center; gap:14px; padding:16px 18px; border-bottom:1px solid var(--border); }
.logo-header img { width:48px; height:48px; border-radius:10px; }
.logo-header .name { font-size:15px; font-weight:600; }
.logo-header .desc { font-size:11px; color:var(--muted); margin-top:2px; }
.logo-prompt { padding:14px 18px; }
.logo-prompt label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); font-weight:600; margin-bottom:6px; display:block; }
.logo-prompt p { font-size:11px; color:rgba(255,255,255,0.55); line-height:1.6; }
.copy-btn { margin-top:10px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); font-size:10px; padding:5px 12px; border-radius:5px; cursor:pointer; transition:all 0.12s; }
.copy-btn:hover { background:rgba(255,255,255,0.1); color:var(--text); }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-ip" id="sidebarIp">localhost</span>
  </div>
  <div class="sidebar-nav">
    <a href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Status
    </a>
    <a href="/crons.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Cron Jobs
    </a>
    <a href="/gallery.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Screenshots
    </a>
    <a href="/logos.html" class="active">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Logos
    </a>
    <a href="/docs.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      API Docs
    </a>
  </div>
  <div class="sidebar-footer">localhost:9876</div>
</nav>

<div class="main">
  <h1>App Logos</h1>
  <div class="logo-grid" id="logoGrid"></div>
</div>

<script>
const PROMPTS = {
  'tools': {
    desc: 'Collection of 30+ developer utilities',
    prompt: 'Design a 1024x1024 app icon for "Tools", a collection of 30+ developer utilities. A pixelated Swiss Army knife with colorful rainbow tools (wrench, pliers, blade, terminal) fanning out. Dark carbon fiber background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'diagrams': {
    desc: 'Sequence diagram and workflow tool',
    prompt: 'Design a 1024x1024 app icon for "Diagrams", a sequence diagram and visual workflow tool. Show a vertical sequence diagram with colored lifeline bars (purple, cyan, pink) connected by horizontal arrow messages flowing between them. Deep purple (#8B5CF6) gradient fading to violet background with rounded iOS corners. Add glowing neon connection lines and small colored dots at intersection points. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'claude': {
    desc: 'Claude Code dashboard and session manager',
    prompt: 'Design a 1024x1024 app icon for "Claude Dashboard", an AI session and memory manager. A gold hexagon containing a circuit-board brain with glowing nodes, bar charts and pie chart accents. Dark charcoal background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'stickies': {
    desc: 'Collaborative sticky notes board',
    prompt: 'Design a 1024x1024 app icon for "Stickies", a collaborative sticky notes board. Stacked yellow sticky notes with a red pushpin, checkmark, and colorful small cards. Warm orange background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'mindmaps': {
    desc: 'Visual mind mapping tool',
    prompt: 'Design a 1024x1024 app icon for "Mindmaps", a visual mind mapping tool. A glowing central node with radiating branches like a neuron, small colored dots at endpoints. Indigo (#6366F1) to purple gradient background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'safe': {
    desc: 'Local .env secrets manager',
    prompt: 'Design a 1024x1024 app icon for "Safe", a local secrets manager. A steel shield with a vault dial and green (#22C55E) glowing key slot. Dark gunmetal background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'drop': {
    desc: 'LAN file transfer between devices',
    prompt: 'Design a 1024x1024 app icon for "Drop", a LAN file transfer app. A parachute dropping a package box with motion lines. Green (#16A34A) to teal gradient background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'ai-spinner': {
    desc: 'Menubar AI activity indicator',
    prompt: 'Design a 1024x1024 app icon for "AI Spinner", an AI activity indicator. A glowing neon atom with orbiting rings in pink (#F92672), yellow (#E6DB74), cyan (#66D9EF) with a bright core. Dark space/navy background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'moments': {
    desc: 'Digital photo frame app',
    prompt: 'Design a 1024x1024 app icon for "Moments", a digital photo frame app. A gold camera aperture blending into a picture frame with a warm sunset inside. Dark black background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'frames': {
    desc: 'Device mockup generator',
    prompt: 'Design a 1024x1024 app icon for "Frames", a device mockup generator. Overlapping silver Apple device silhouettes - MacBook, iPhone, iPad. Dark (#0E0E10) background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  },
  'bheng': {
    desc: 'Personal developer portfolio',
    prompt: 'Design a 1024x1024 app icon for "bheng", a developer portfolio. Minimalist letter B stylized as a code bracket with electric blue glow. Black background with rounded iOS corners. No white background, no border, no text, no watermark. Single centered icon, clean edges.'
  }
};

const FAVICONS = {
  'bheng': '/favicons/bheng.png',
  'tools': '/favicons/tools.png',
  'diagrams': '/favicons/diagrams.png',
  'claude': '/favicons/claude.png',
  'stickies': '/favicons/stickies.png',
  'mindmaps': '/favicons/mindmaps.png',
  'safe': '/favicons/safe.png',
  'drop': '/favicons/drop.png',
  'ai-spinner': '/favicons/ai-spinner.png',
  'moments': '/favicons/moments.png',
  'frames': '/favicons/frames.png',
};

const _v = Date.now();
async function load() {
  const res = await fetch('/api/apps');
  const apps = await res.json();
  const grid = document.getElementById('logoGrid');

  grid.innerHTML = apps.map(app => {
    const p = PROMPTS[app.id];
    if (!p) return '';
    const icon = FAVICONS[app.id] || '';
    return `
    <div class="logo-card">
      <div class="logo-header">
        ${icon ? `<img src="${icon}?v=${_v}" alt="${app.name}">` : ''}
        <div>
          <div class="name">${app.name}</div>
          <div class="desc">${p.desc}</div>
        </div>
      </div>
      <div class="logo-prompt">
        <label>Gemini Prompt</label>
        <p>${p.prompt}</p>
        <button class="copy-btn" onclick="copyPrompt(this, '${app.id}')">Copy Prompt</button>
      </div>
    </div>`;
  }).join('');
}

function copyPrompt(btn, id) {
  const p = PROMPTS[id];
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
  });
}

load();
</script>
</body>
</html>
