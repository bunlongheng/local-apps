<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Vault door outer ring -->
  <circle cx="60" cy="58" r="32" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
  <!-- Vault door inner -->
  <circle cx="60" cy="58" r="22" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Dial ticks (4 major) -->
  <line x1="60" y1="28" x2="60" y2="34" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="82" x2="60" y2="88" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="58" x2="36" y2="58" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="84" y1="58" x2="90" y2="58" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handle / spoke -->
  <line x1="60" y1="58" x2="74" y2="44" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  <!-- Center knob -->
  <circle cx="60" cy="58" r="5" fill="url(#accent)"/>
  <!-- Lock bolt on right -->
  <rect x="89" y="52" width="8" height="12" rx="2" fill="url(#accent)"/>
  <!-- Label -->
  <text x="60" y="107" text-anchor="middle"
    font-family="'SF Pro Display', 'Inter', 'system-ui', sans-serif"
    font-size="11" font-weight="700" letter-spacing="2"
    fill="#a78bfa" opacity="0.85">VAULT</text>
</svg>
