<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshots Gallery</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #20243a;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #6366f1;
    --accent2: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .back-link { color: var(--muted); text-decoration: none; font-size: 11px; display: flex; align-items: center; gap: 5px; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 200px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 8px; }
  .sidebar-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 6px 8px 4px; font-weight: 600; }
  .app-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; }
  .app-item:hover { background: var(--surface); }
  .app-item.active { background: var(--surface2); border-color: var(--border); }
  .app-item img { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
  .app-item .app-label { font-size: 12px; font-weight: 500; }
  .app-item .shot-count { font-size: 10px; color: var(--muted); margin-left: auto; }
  .dot-s { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-s.up { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
  .dot-s.down { background: #ef4444; }
  .dot-s.unknown { background: var(--muted); }
  .app-hide { display:none; background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; padding:2px 4px; border-radius:4px; margin-left:auto; transition:all 0.12s; line-height:1; }
  .app-item:hover .app-hide { display:block; }
  .app-hide:hover { color:#f87171; background:rgba(248,113,113,0.1); }
  .app-item.hidden-app { opacity:0.3; }
  .show-hidden-toggle { font-size:10px; color:var(--muted); padding:6px 10px; cursor:pointer; border:none; background:none; font-family:inherit; transition:color 0.12s; }
  .show-hidden-toggle:hover { color:var(--text); }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Mode tabs */
  .tabs { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center; }
  .tab { background: none; border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: 11px; padding: 5px 14px; border-radius: 6px; cursor: pointer; transition: all 0.12s; letter-spacing: 0.02em; }
  .tab:hover { border-color: var(--text); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .tab-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .count-badge { font-size: 10px; color: var(--muted); margin-left: auto; }

  /* Grid */
  .grid-wrap { flex: 1; overflow-y: auto; padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .thumb { border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; background: var(--surface); position: relative; }
  .thumb:hover { border-color: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .thumb img { width: 100%; display: block; object-fit: cover; aspect-ratio: 16/10; background: #111; }
  .thumb.mobile-thumb img { aspect-ratio: 9/19.5; }
  .thumb.framed-mobile img { aspect-ratio: 9/20; object-fit: contain; background: #0a0a0a; }
  .thumb.framed-desktop img { aspect-ratio: 16/10; object-fit: contain; background: #fff; }
  .thumb-label { padding: 8px 10px; font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid var(--border); }
  .thumb.retake { border-color: #f59e0b !important; }
  .thumb-actions { display: none; position: absolute; top: 6px; right: 6px; gap: 5px; flex-direction: column; z-index: 2; }
  .thumb:hover .thumb-actions { display: flex; }
  .act-btn { border: none; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background .12s; }
  .act-retake { background: rgba(15,17,23,.82); color: #94a3b8; }
  .act-retake:hover { background: #78350f; color: #fbbf24; }
  .act-retake.on { background: #78350f; color: #fbbf24; }
  .act-delete { background: rgba(15,17,23,.82); color: #94a3b8; }
  .act-delete:hover { background: #450a0a; color: #f87171; }
  .retake-badge { display: none; position: absolute; top: 6px; left: 6px; background: #f59e0b; color: #000; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 5px; letter-spacing: .04em; pointer-events: none; z-index: 2; }
  .thumb.retake .retake-badge { display: block; }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); gap: 10px; }
  .empty .icon { font-size: 40px; opacity: 0.3; }

  /* Lightbox */
  .lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
  .lb.open { display: flex; }
  .lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; width: 100%; position: relative; }
  .lb-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; box-shadow: 0 0 80px rgba(0,0,0,0.8); display: block; }
  .lb-bar { height: 52px; flex-shrink: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.08); }
  .lb-name { font-size: 12px; color: var(--muted); }
  .lb-counter { font-size: 11px; color: var(--muted); }
  .lb-close { position: fixed; top: 16px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; z-index: 10; }
  .lb-close:hover { background: rgba(255,255,255,0.2); }
  .lb-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; z-index: 10; }
  .lb-arrow:hover { background: rgba(255,255,255,0.18); }
  .lb-arrow.prev { left: 16px; }
  .lb-arrow.next { right: 16px; }
  .lb-arrow:disabled { opacity: 0.2; cursor: default; }
  .lb-arrow:disabled:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>

<header>
  <a href="/" class="back-link">← Monitor</a>
  <h1>📸 Screenshots Gallery</h1>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-right:4px">
      <div class="sidebar-label">Apps</div>
      <button class="show-hidden-toggle" id="toggleHidden" onclick="toggleShowHidden()">Show hidden</button>
    </div>
    <div id="appList"></div>
  </aside>

  <div class="main">
    <div class="tabs" id="tabBar">
      <button class="tab active" data-mode="desktop"         onclick="setMode('desktop')">🖥 Desktop</button>
      <button class="tab"        data-mode="desktop-framed"  onclick="setMode('desktop-framed')">💻 MacBook</button>
      <div class="tab-sep"></div>
      <button class="tab"        data-mode="mobile"          onclick="setMode('mobile')">📱 Mobile</button>
      <button class="tab"        data-mode="mobile-framed"   onclick="setMode('mobile-framed')">iPhone</button>
      <div class="tab-sep"></div>
      <button class="tab"        data-mode="gifs"            onclick="setMode('gifs')">🎬 GIFs</button>
      <span class="count-badge" id="countBadge"></span>
      <button class="tab" id="retakeBtn" style="margin-left:auto;background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.3);color:#4ade80" onclick="retakeAll()">📷 Retake</button>
      <button class="tab" id="exportPdfBtn" style="background:rgba(99,102,241,0.1);border-color:var(--accent);color:var(--accent2)" onclick="exportPdf()">📄 Export PDF</button>
    </div>
    <div class="grid-wrap" id="gridWrap">
      <div class="empty"><div class="icon">🖼</div><div>Select an app to view screenshots</div></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-arrow prev" id="lbPrev" onclick="lbNav(-1)">‹</button>
  <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
  <button class="lb-arrow next" id="lbNext" onclick="lbNav(1)">›</button>
  <div class="lb-bar">
    <span class="lb-name" id="lbName"></span>
    <span class="lb-counter" id="lbCounter"></span>
  </div>
</div>

<script src="/shared.js"></script>
<script>
let allApps = [];
let appData = {};   // id → index.json data
let gifData = {};   // id → gifs/index.json data
let retakeData = {}; // id → retake.json data  { "mode/filename": true }
let currentApp = null;
let currentMode = 'desktop';
let currentShots = [];
let lbIdx = 0;
let hiddenApps = JSON.parse(localStorage.getItem('gallery-hidden') || '[]');
let showHidden = false;

let appNames = {};

async function init() {
  await _sharedReady;
  // Load master index + app names from API
  const [idx, appsApi, status] = await Promise.all([
    fetch('/screenshots/index.json').then(r => r.json()).catch(() => []),
    fetch('/api/apps').then(r => r.json()).catch(() => []),
    fetch('/api/status').then(r => r.json()).catch(() => ({ apps: [] })),
  ]);
  appsApi.forEach(a => { appNames[a.id] = a.name; });
  const statusMap = {};
  (status.apps || []).forEach(a => statusMap[a.id] = a.status);

  allApps = Array.isArray(idx) ? idx : [];

  // Load each app's index + retake list
  await Promise.all(allApps.map(async a => {
    try {
      const d = await fetch(`/screenshots/${a.id}/index.json`).then(r => r.json());
      appData[a.id] = d;
    } catch {}
    try {
      const r = await fetch(`/api/retake/${a.id}`).then(r => r.json());
      retakeData[a.id] = r;
    } catch { retakeData[a.id] = {}; }
    try {
      const g = await fetch(`/screenshots/${a.id}/gifs/index.json`).then(r => r.json());
      gifData[a.id] = g.gifs || [];
    } catch { gifData[a.id] = []; }
  }));

  renderSidebar(statusMap);

  // Auto-select from ?app= param or first app
  const paramApp = new URLSearchParams(location.search).get('app');
  const defaultApp = paramApp && allApps.find(a => a.id === paramApp) ? paramApp : (allApps[0]?.id);
  if (defaultApp) selectApp(defaultApp);
}

function renderSidebar(statusMap) {
  const list = document.getElementById('appList');
  const toggleBtn = document.getElementById('toggleHidden');
  const hasHidden = hiddenApps.length > 0;
  toggleBtn.style.display = hasHidden ? '' : 'none';
  toggleBtn.textContent = showHidden ? 'Hide hidden' : `Show hidden (${hiddenApps.length})`;

  list.innerHTML = allApps.filter(a => showHidden || !hiddenApps.includes(a.id)).map(a => {
    const data = appData[a.id] || {};
    const gifs = (gifData[a.id] || []).length;
    const shots = (data.desktop || data.screenshots || []).length + (data.mobile || []).length + gifs;
    const favicon = FAVICONS[a.id] ? `<img src="${FAVICONS[a.id]}" onerror="this.style.display='none'">` : '';
    const isHidden = hiddenApps.includes(a.id);
    const name = appNames[a.id] || a.id;
    return `<div class="app-item${isHidden ? ' hidden-app' : ''}" id="app-${a.id}" onclick="selectApp('${a.id}')">
      ${favicon}
      <span class="app-label">${name}</span>
      <span class="shot-count">${shots || ''}</span>
      <button class="app-hide" onclick="event.stopPropagation();toggleHideApp('${a.id}')" title="${isHidden ? 'Unhide' : 'Hide'}">${isHidden ? '+' : '✕'}</button>
    </div>`;
  }).join('');
}

function selectApp(id) {
  currentApp = id;
  document.querySelectorAll('.app-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('app-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
  renderGrid();
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  renderGrid();
}

function isNewFormat(id) {
  const data = appData[id];
  return data && (data.desktop || data.mobile);
}

function getShots(id, mode) {
  if (mode === 'gifs') return gifData[id] || [];
  const data = appData[id];
  if (!data) return [];
  if (isNewFormat(id)) {
    if (mode === 'desktop')        return data.desktop || [];
    if (mode === 'mobile')         return data.mobile  || [];
    if (mode === 'desktop-framed') return data.desktop || [];
    if (mode === 'mobile-framed')  return data.mobile  || [];
    return [];
  }
  // Flat/legacy format — everything is "desktop"
  if (mode === 'desktop') return data.screenshots || [];
  return [];
}

function shotUrl(id, mode, filename) {
  if (mode === 'gifs') return `/screenshots/${id}/gifs/${filename}`;
  if (isNewFormat(id)) return `/screenshots/${id}/${mode}/${filename}`;
  // Flat format — files are directly in the app folder
  return `/screenshots/${id}/${filename}`;
}

function renderGrid() {
  if (!currentApp) return;

  // Show/hide tabs based on format
  const newFmt = isNewFormat(currentApp);
  const hasGifs = (gifData[currentApp] || []).length > 0;
  document.querySelectorAll('.tab[data-mode="mobile"], .tab[data-mode="mobile-framed"], .tab[data-mode="desktop-framed"]').forEach(el => {
    el.style.display = newFmt ? '' : 'none';
  });
  document.querySelector('.tab[data-mode="gifs"]').style.display = hasGifs ? '' : 'none';
  // Show/hide separators
  document.querySelectorAll('.tab-sep').forEach((el, i) => {
    if (i === 0) el.style.display = newFmt ? '' : 'none';
    if (i === 1) el.style.display = hasGifs ? '' : 'none';
  });
  if (!newFmt && currentMode !== 'desktop') { currentMode = 'desktop'; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === 'desktop')); }

  const shots = getShots(currentApp, currentMode);
  currentShots = shots;

  document.getElementById('countBadge').textContent = shots.length ? `${shots.length} shots` : '';

  const wrap = document.getElementById('gridWrap');
  if (!shots.length) {
    wrap.innerHTML = `<div class="empty"><div class="icon">📂</div><div>No screenshots for this mode</div></div>`;
    return;
  }

  const isMobile = currentMode.includes('mobile');
  const isFramed = currentMode.includes('framed');
  const cls = isFramed && isMobile ? 'framed-mobile' : isFramed ? 'framed-desktop' : isMobile ? 'mobile-thumb' : '';

  const rt = retakeData[currentApp] || {};
  wrap.innerHTML = `<div class="grid">${shots.map((f, i) => {
    const key = `${currentMode}/${f}`;
    const isRetake = !!rt[key];
    return `
    <div class="thumb ${cls}${isRetake ? ' retake' : ''}" id="thumb-${i}">
      <span class="retake-badge">RETAKE</span>
      <img src="${shotUrl(currentApp, currentMode, f)}" loading="lazy" alt="${f}"
        onerror="this.parentElement.style.display='none'"
        onclick="openLb(${i})" style="cursor:pointer">
      <div class="thumb-actions">
        <button class="act-btn act-retake${isRetake ? ' on' : ''}" title="Mark for retake"
          onclick="toggleRetake(${i},'${f}',this)">↩</button>
        <button class="act-btn act-delete" title="Delete"
          onclick="deletShot(${i},'${f}')">✕</button>
      </div>
      <div class="thumb-label" onclick="openLb(${i})">${f.replace('.png', '')}</div>
    </div>`}).join('')}</div>`;
}

// Lightbox
function openLb(idx) {
  lbIdx = idx;
  updateLb();
  document.getElementById('lb').classList.add('open');
}

function updateLb() {
  const shots = currentShots;
  const f = shots[lbIdx];
  document.getElementById('lbImg').src = shotUrl(currentApp, currentMode, f);
  document.getElementById('lbName').textContent = f;
  document.getElementById('lbCounter').textContent = `${lbIdx + 1} / ${shots.length}`;
  document.getElementById('lbPrev').disabled = lbIdx === 0;
  document.getElementById('lbNext').disabled = lbIdx === shots.length - 1;
}

function lbNav(dir) {
  lbIdx = Math.max(0, Math.min(currentShots.length - 1, lbIdx + dir));
  updateLb();
}

function closeLb() {
  document.getElementById('lb').classList.remove('open');
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lb');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLb();
  if (e.key === 'ArrowLeft')   lbNav(-1);
  if (e.key === 'ArrowRight')  lbNav(1);
});

async function toggleRetake(i, filename, btn) {
  const r = await fetch('/api/retake', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ appId: currentApp, mode: currentMode, filename })
  }).then(r => r.json()).catch(() => ({}));
  const marked = !!r.marked;
  if (!retakeData[currentApp]) retakeData[currentApp] = {};
  const key = `${currentMode}/${filename}`;
  if (marked) retakeData[currentApp][key] = true; else delete retakeData[currentApp][key];
  const card = document.getElementById('thumb-' + i);
  if (card) card.classList.toggle('retake', marked);
  btn.classList.toggle('on', marked);
}

async function deletShot(i, filename) {
  if (!confirm(`Delete ${filename}?`)) return;
  await fetch('/api/screenshot', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ appId: currentApp, mode: currentMode, filename })
  }).catch(() => {});
  // Remove from local shots list and re-render
  const data = appData[currentApp];
  if (data && Array.isArray(data[currentMode])) {
    data[currentMode] = data[currentMode].filter(f => f !== filename);
  }
  renderGrid();
}

function toggleHideApp(id) {
  if (hiddenApps.includes(id)) {
    hiddenApps = hiddenApps.filter(x => x !== id);
  } else {
    hiddenApps.push(id);
  }
  localStorage.setItem('gallery-hidden', JSON.stringify(hiddenApps));
  renderSidebar({});
}

function toggleShowHidden() {
  showHidden = !showHidden;
  renderSidebar({});
}

function exportPdf() {
  if (!currentApp || !currentShots.length) return;
  const name = appNames[currentApp] || currentApp;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${name} — Screenshots</title>
<style>
  @page { size: landscape; margin: 0.5in; }
  @media print { .no-print { display:none; } }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,sans-serif; background:#fff; color:#000; }
  h1 { font-size:20px; margin:20px 0 10px; }
  .meta { font-size:12px; color:#666; margin-bottom:20px; }
  .shot { page-break-inside:avoid; margin-bottom:24px; }
  .shot img { width:100%; max-height:80vh; object-fit:contain; border:1px solid #ddd; border-radius:4px; }
  .shot-name { font-size:11px; color:#888; margin-top:4px; }
  .toolbar { position:fixed; top:10px; right:10px; z-index:100; }
  .toolbar button { padding:8px 20px; font-size:13px; background:#6366f1; color:#fff; border:none; border-radius:6px; cursor:pointer; font-family:inherit; }
</style></head><body>
<div class="toolbar no-print"><button onclick="window.print()">Print / Save PDF</button></div>
<h1>${name}</h1>
<div class="meta">${currentMode} · ${currentShots.length} screenshots · ${new Date().toLocaleDateString()}</div>
${currentShots.map(f => `<div class="shot"><img src="${location.origin}${shotUrl(currentApp, currentMode, f)}"><div class="shot-name">${f.replace('.png','')}</div></div>`).join('')}
</body></html>`);
  w.document.close();
}

async function retakeAll() {
  if (!currentApp) return;
  const btn = document.getElementById('retakeBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Running…';
  btn.style.color = '#facc15';
  try {
    const res = await fetch('/api/screenshots/' + currentApp, { method: 'POST' });
    const data = await res.json();
    if (data.status === 'already_running') {
      btn.textContent = '⟳ Already running';
    } else {
      btn.textContent = '✓ Started';
      // Poll for completion
      const poll = setInterval(async () => {
        const s = await fetch('/api/screenshots-status').then(r => r.json()).catch(() => ({}));
        if (!s[currentApp]) {
          clearInterval(poll);
          btn.textContent = '📷 Retake';
          btn.style.color = '#4ade80';
          btn.disabled = false;
          // Reload screenshots
          try {
            const d = await fetch(`/screenshots/${currentApp}/index.json`).then(r => r.json());
            appData[currentApp] = d;
          } catch {}
          renderGrid();
        }
      }, 3000);
    }
  } catch {
    btn.textContent = '❌ Error';
  }
  setTimeout(() => { btn.disabled = false; }, 3000);
}

init();
</script>
</body>
</html>
